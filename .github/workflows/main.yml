name: Publish resume in JSONResume format as Github Page
 
on:
  push:
    branches: [ main ]

jobs:
  check_run:
    runs-on: ubuntu-latest
    if: "! contains(github.event.head_commit.message, '[ci skip]')"
    steps:
      - run: echo "${{ github.event.head_commit.message }}"

  build:
    runs-on: ubuntu-latest
    needs: check_run
    steps:
      - uses: actions/checkout@v4
      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - uses: kelvintaywl/action-jsonresume-export@v1
        name: Export resume as HTML
        with:
          theme: elegant
          resume_filepath: resume.json
          # modifies the index.html in-place
          output_filepath: index.html
      - name: Inject Custom HTML Tags
        run: |
          python add_custom_tags.py
      - name: Setup Node.js for resume-cli
        uses: actions/setup-node@v4
        with:
          node-version: '20'
      - name: Generate PDF using resume-cli
        env:
          RESUME_PUPPETEER_NO_SANDBOX: "1"
        run: |
          npm install -g resume-cli@3.1.2 @jsonresume/jsonresume-theme-class
          resume export assets/RafnixGuzman_CV.pdf --format pdf --theme @jsonresume/jsonresume-theme-class
      - name: Commit published HTML and PDF
        id: commit
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"
          CHANGED=false
          if [ -n "$(git status --porcelain index.html)" ]; then
            git add index.html
            CHANGED=true
          fi
          if [ -n "$(git status --porcelain assets/RafnixGuzman_CV.pdf)" ]; then
            git add assets/RafnixGuzman_CV.pdf
            CHANGED=true
          fi
          if [ "$CHANGED" = "true" ]; then
            git commit -m "[ci skip] chore: update resume page and PDF"
            echo "exit_code=0" >> $GITHUB_OUTPUT
          else
            echo "exit_code=1" >> $GITHUB_OUTPUT
          fi
      - name: Push changes
        uses: ad-m/github-push-action@v0.8.0
        if: steps.commit.outputs.exit_code == 0
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          branch: ${{ github.ref }}
